services:
  base:
    build:
      context: .
      dockerfile: base.Dockerfile
    image: base:latest
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: server:latest
    depends_on:
      - db
      - coturn
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5555:5555"
    networks:
      - app-network
  db:
    image: postgres:18-alpine
    container_name: pg-minimal
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - ./server/database/init:/docker-entrypoint-initdb.d
    networks:
      - app-network
  coturn:
    image: coturn/coturn:alpine
    container_name: turn-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro

networks:
  app-network:
    driver: bridge