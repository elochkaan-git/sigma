name: 'Sigma'

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    permissions: write-all

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          modules: 'qtwebsockets'
          cache: true

      # Just for example
      # - name: Installing dependencies (Linux)
      #   if: matrix.os == 'ubuntu-latest'
      #   run:
      #     sudo apt-get update -y;
      #     sudo apt-get install -y libxrandr-dev libxcursor-dev libxi-dev libudev-dev libflac-dev libvorbis-dev libgl1-mesa-dev libegl1-mesa-dev libfreetype6-dev libboost-all-dev

      # It's commented because we don't have CMakeLists.txt
      - name: Configure Cmake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -B build -S . -G "Unix Makefiles"

      - name: Configure Cmake (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64

      # Only building, no packaging
      - name: Build project and package
        run: cmake --build build --config Release
          
