name: 'Sigma'

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    permissions: write-all

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_TRIPLET: ${{ matrix.os == 'windows-latest' && 'x64-windows-release' || 'x64-linux-release' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          modules: 'qtwebsockets qtmultimedia'
          arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2022_64' || '' }}
          cache: true

      # ------------------------------------------------------------------
      # Настройка vcpkg
      # ------------------------------------------------------------------
      - name: Setup vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Setup vcpkg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          $VCPKG_ROOT/bootstrap-vcpkg.sh

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ matrix.os == 'windows-latest' && '~/AppData/Local/vcpkg/archives' || '~/.cache/vcpkg/archives' }}
          key: vcpkg-${{ runner.os }}-ffmpeg-openssl-pkgconf-v3
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # ------------------------------------------------------------------
      # Установка зависимостей через vcpkg (раздельно для Windows и Linux)
      # ------------------------------------------------------------------
      - name: Install FFmpeg / OpenSSL / pkgconf via vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install "ffmpeg[core,avcodec,avformat,swscale,swresample]:$env:VCPKG_TRIPLET" "openssl:$env:VCPKG_TRIPLET" "pkgconf:$env:VCPKG_TRIPLET"
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_TRIPLET: ${{ env.VCPKG_TRIPLET }}

      - name: Install FFmpeg / OpenSSL / pkgconf via vcpkg (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get install nasm linux-libc-dev -y
          $VCPKG_ROOT/vcpkg install "ffmpeg[core,avcodec,avformat,swscale,swresample]:$VCPKG_TRIPLET" "openssl:$VCPKG_TRIPLET" "pkgconf:$VCPKG_TRIPLET"
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_TRIPLET: ${{ env.VCPKG_TRIPLET }}

      - name: Add pkgconf to PATH (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:github_workspace "vcpkg"
          $pkgconfDir = Join-Path $vcpkgRoot "installed" $env:VCPKG_TRIPLET "tools" "pkgconf"
          echo "$pkgconfDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $pkgConfigPath = Join-Path $vcpkgRoot "installed" $env:VCPKG_TRIPLET "lib" "pkgconfig"
          echo "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Add pkgconf to PATH (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "$VCPKG_ROOT/installed/$VCPKG_TRIPLET/tools/pkgconf" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=$VCPKG_ROOT/installed/$VCPKG_TRIPLET/lib/pkgconfig" >> $GITHUB_ENV

      - name: Setup MSVC environment (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ------------------------------------------------------------------
      # Сборка клиента
      # ------------------------------------------------------------------
      - name: Configure Client (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -B build_client -S . -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DNO_SERVER=ON -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=$VCPKG_TRIPLET

      - name: Configure Client (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build_client -S . -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DNO_SERVER=ON -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=$env:VCPKG_TRIPLET

      - name: Build Client
        run: cmake --build build_client --config Release

      - name: Install Client
        run: |
          cmake --install build_client --prefix "${{ github.workspace }}/install_client" --config Release
          ls -R "${{ github.workspace }}/install_client/bin"

      # ------------------------------------------------------------------
      # Сборка сервера
      # ------------------------------------------------------------------
      - name: Configure Server (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -B build_server -S . -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DNO_CLIENT=ON -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=$VCPKG_TRIPLET

      - name: Configure Server (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build_server -S . -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DNO_CLIENT=ON -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=$env:VCPKG_TRIPLET

      - name: Build Server
        run: cmake --build build_server --config Release

      - name: Install Server
        run: cmake --install build_server --prefix "${{ github.workspace }}/install_server" --config Release

      # ------------------------------------------------------------------
      # Развёртывание зависимостей для самодостаточного пакета
      # ------------------------------------------------------------------
      - name: Deploy Qt (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          windeployqt "$env:github_workspace\install_client\bin\SigmaMessenger.exe" `
          --qmldir "$env:github_workspace\client\qml" `
          --dir "$env:github_workspace\install_client" `
          --no-system-d3d-compiler
          windeployqt "$env:github_workspace\install_server\bin\server.exe" `
            --no-quick-import --no-system-d3d-compiler

      - name: Copy vcpkg DLLs (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $vcpkgBin = Join-Path $env:github_workspace "vcpkg" "installed" $env:VCPKG_TRIPLET "bin"
          Copy-Item "$vcpkgBin\*.dll" -Destination "$env:github_workspace\install_client\bin\" -Force
          Copy-Item "$vcpkgBin\*.dll" -Destination "$env:github_workspace\install_server\bin\" -Force -ErrorAction SilentlyContinue

      - name: Bundle dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p dist
        cp -r install_client/* dist/
        cp -fr install_server/* dist/   # если install_server существует
        # Проверка (опционально)
        ldd dist/bin/SigmaMessenger || true
        [ -f dist/bin/server ] && ldd dist/bin/server || true 

      # ------------------------------------------------------------------
      # Подготовка финального архива
      # ------------------------------------------------------------------
      - name: Prepare distribution (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item -Recurse install_client\* dist\

      # ------------------------------------------------------------------
      # Архивация и загрузка релиза
      # ------------------------------------------------------------------
      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG=$(git describe --abbrev=0 --tags)
          7z a SigmaMessenger-${TAG}-${{ matrix.os }}.zip ./dist/*

      - name: Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          TAG=$(git describe --abbrev=0 --tags)
          tar -czf SigmaMessenger-${TAG}-${{ matrix.os }}.tar.gz -C dist .

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ext: ${{ matrix.os == 'ubuntu-latest' && '.tar.gz' || '.zip' }}
        shell: bash
        run: |
          TAG=$(git describe --abbrev=0 --tags)
          ARTIFACT="SigmaMessenger-${TAG}-${{ matrix.os }}${ext}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            gh release upload "${TAG}" "${ARTIFACT}" --clobber
          else
            gh release create "${TAG}" "${ARTIFACT}" --title "${TAG}" --notes "Automated release"
          fi
