name: 'Sigma'

on:
  push:
    branches:
      - main

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_TRIPLET: x64-windows

jobs:
  build:
    strategy:
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    permissions: write-all

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          modules: 'qtwebsockets qtmultimedia'
          arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2022_64' || '' }}
          cache: true

      # ------------------------------------------------------------------
      # Linux: системные зависимости, нужные ещё на этапе конфигурации
      # клиента (FFmpeg — через pkg-config, OpenSSL — нужен libdatachannel)
      # ------------------------------------------------------------------
      - name: Install build dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libssl-dev \
            ninja-build

      # ------------------------------------------------------------------
      # Windows: те же зависимости через vcpkg (FFmpeg и OpenSSL не ставятся
      # системно на раннерах и через apt их не получить)
      # ------------------------------------------------------------------
      - name: Setup vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Cache vcpkg packages (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/buildtrees
            ~/AppData/Local/vcpkg/archives
          key: vcpkg-${{ runner.os }}-ffmpeg-openssl-pkgconf-v1

      - name: Install FFmpeg / OpenSSL / pkgconf via vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            "ffmpeg[core,avcodec,avformat,swscale,swresample]:$env:VCPKG_TRIPLET" `
            "openssl:$env:VCPKG_TRIPLET" `
            "pkgconf:$env:VCPKG_TRIPLET"

          # Прокидываем pkgconf и PKG_CONFIG_PATH в последующие шаги job'а
          "$env:VCPKG_ROOT\installed\$env:VCPKG_TRIPLET\tools\pkgconf" |
            Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "PKG_CONFIG_PATH=$env:VCPKG_ROOT\installed\$env:VCPKG_TRIPLET\lib\pkgconfig" |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup MSVC environment (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ------------------------------------------------------------------
      # Сборка клиента (конфигурируется из корня — заодно собирает и server,
      # так было устроено в исходном CMakeLists — это не менялось)
      # ------------------------------------------------------------------
      - name: Configure Client (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -B build_client -S . -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DNO_SERVER=ON

      - name: Configure Client (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build_client -S . -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DNO_SERVER=ON -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=$env:VCPKG_TRIPLET

      - name: Build Client
        run: cmake --build build_client --config Release

      - name: Install Client
        run: cmake --install build_client --prefix "${{ github.workspace }}/install_client" --config Release

      # ------------------------------------------------------------------
      # Сборка сервера
      # ------------------------------------------------------------------
      - name: Configure Server (Linux)
        if: matrix.os == 'ubuntu-latest'
        run:  cmake -B build_server -S . -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DNO_CLIENT=ON

      - name: Configure Server (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build_server -S . -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DNO_CLIENT=ON

      - name: Build Server
        run: cmake --build build_server --config Release

      - name: Install Server
        run: cmake --install build_server --prefix "${{ github.workspace }}/install_server" --config Release

      # ------------------------------------------------------------------
      # Сборка в единый дистрибутив
      # ------------------------------------------------------------------
      - name: Prepare distribution
        shell: bash
        run: |
          mkdir -p dist/bin
          cp -r install_client/bin/* dist/bin/
          cp -r install_client/* dist/
          if [ -f install_server/server ]; then
            cp install_server/server dist/bin/
          fi
          if [ -f install_server/server.exe ]; then
            cp install_server/server.exe dist/bin/
          fi
          cp -r install_server/* dist/

      # Архивация
      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          TAG=$(git describe --abbrev=0 --tags)
          7z a SigmaMessenger-${TAG}-${{ matrix.os }}.zip ./dist/*

      - name: Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          TAG=$(git describe --abbrev=0 --tags)
          tar -czf SigmaMessenger-${TAG}-${{ matrix.os }}.tar.gz -C dist .

      # Выгрузка
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ext: ${{ matrix.os == 'ubuntu-latest' && '.tar.gz' || '.zip' }}
        shell: bash
        run: |
          TAG=$(git describe --abbrev=0 --tags)
          ARTIFACT="SigmaMessenger-${TAG}-${{ matrix.os }}${ext}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            gh release upload "${TAG}" "${ARTIFACT}" --clobber
          else
            gh release create "${TAG}" "${ARTIFACT}" --title "${TAG}" --notes "Automated release"
          fi