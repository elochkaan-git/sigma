services:
  db:
    image: postgres:18-alpine
    container_name: pg-minimal
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d